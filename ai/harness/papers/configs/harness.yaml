# Paper harness configuration
paths:
  root: "."                            # relative to this file's parent-parent (papers/)
  legacy_source: "C:/Users/HyeonYongLEE/Desktop/trading/papers"
  legacy: "legacy"
  focused: "focused"
  index: "index"
  chroma_db: "chroma_db"
  logs: "logs"

embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"
  # 대안: "BAAI/bge-small-en-v1.5"
  device: "cpu"                        # "cuda" 가능하면 자동 승격
  batch_size: 32

vector_db:
  collection: "papers"
  distance: "cosine"

download:
  since_date: "2024-01-01"
  per_category: 20
  arxiv_rate_sec: 3.0
  s2_rate_sec: 3.0
  retries: 3
  request_timeout_sec: 60

categories:
  llm_finetune_rag:
    name: "LLM 파인튜닝·RAG"
    description: "SFT/LoRA/QLoRA/DPO/RLHF, RAG(dense/hybrid), long context, tool use in LLMs"
    queries:
      - "LoRA fine-tuning large language models"
      - "QLoRA quantized fine-tuning"
      - "DPO direct preference optimization"
      - "RLHF alignment large language model"
      - "supervised fine-tuning instruction"
      - "retrieval augmented generation"
      - "hybrid retrieval dense sparse"
      - "long context large language model"
    arxiv_categories: ["cs.CL", "cs.LG", "cs.AI"]

  vlm_multimodal:
    name: "비전-언어 멀티모달 (VLM)"
    description: "LLaVA류, SigLIP/CLIP 후속, VLM fine-tuning, multimodal RAG, visual reasoning"
    queries:
      - "vision language model LLaVA"
      - "SigLIP image text contrastive"
      - "multimodal large language model instruction"
      - "visual reasoning benchmark VLM"
      - "video large language model"
      - "multimodal retrieval augmented generation"
    arxiv_categories: ["cs.CV", "cs.CL", "cs.AI"]

  mlops_serving:
    name: "MLOps·서빙·양자화"
    description: "TorchServe/vLLM/TGI, quantization(GPTQ/AWQ/GGUF/FP8), pruning, distillation, LLM inference optimization"
    queries:
      - "vLLM efficient inference"
      - "LLM serving throughput"
      - "GPTQ quantization large language model"
      - "AWQ activation aware weight quantization"
      - "FP8 quantization inference"
      - "speculative decoding LLM"
      - "KV cache optimization inference"
      - "knowledge distillation LLM"
      - "structured pruning language model"
    arxiv_categories: ["cs.LG", "cs.CL", "cs.DC", "cs.PF"]

  agents_tooluse:
    name: "에이전트·툴유즈"
    description: "ReAct 후속, function calling, multi-agent, computer use, tool learning, agent evals"
    queries:
      - "LLM agent tool use function calling"
      - "multi-agent LLM collaboration"
      - "computer use agent"
      - "SWE-bench software engineering agent"
      - "GAIA benchmark agent"
      - "ReAct reasoning acting"
      - "code agent LLM"
      - "planning large language model agent"
    arxiv_categories: ["cs.AI", "cs.CL", "cs.SE", "cs.LG"]

  fast_learning:
    name: "빠른 학습·적은 데이터로 실력 올리기"
    description: >
      해커톤처럼 시간·데이터가 부족한 상황에서 빠르게 성능을 끌어올리는 방법론.
      in-context/few-shot learning, meta-learning, test-time training·scaling,
      self-improvement(STaR/self-refine), 소량 고품질 데이터(LIMA/phi류),
      합성 데이터 생성(Self-Instruct), 추론 유도 프롬프팅, 지식 증류.
    queries:
      - "in-context learning large language models"
      - "many-shot in-context learning"
      - "few-shot learning language model"
      - "meta-learning fast adaptation"
      - "test-time training adaptation"
      - "test-time compute scaling reasoning"
      - "self-improvement language model bootstrapping"
      - "self-refine iterative refinement LLM"
      - "data-efficient instruction tuning less is more"
      - "synthetic data generation instruction tuning"
      - "chain-of-thought prompting reasoning"
      - "curriculum learning sample efficiency"
      - "distilling reasoning into smaller models"
    arxiv_categories: ["cs.CL", "cs.LG", "cs.AI"]

