services:
  app:
    build: .
    image: hacknation-2026:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ./data:/workspace/data
      - ./experiments:/workspace/experiments
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    env_file:
      - .env
    tty: true
    stdin_open: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  mlflow:
    image: hacknation-2026:latest
    working_dir: /workspace
    depends_on:
      - app
    volumes:
      - ./experiments:/workspace/experiments
    ports:
      - "5000:5000"
    command: >
      mlflow ui
      --backend-store-uri file:/workspace/experiments/mlruns
      --host 0.0.0.0
      --port 5000
