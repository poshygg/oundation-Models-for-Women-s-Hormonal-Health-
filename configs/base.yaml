# configs/base.yaml — 실험별 config가 상속하는 공용 기본값
# quick_start.ps1 이 이 파일을 ai/<kind>/configs/<name>.yaml 로 복사.

experiment:
  name: "unnamed"
  kind: "cnn"   # cnn | llm | vlm | audio
  seed: 42

data:
  root: "./data"
  train_split: "train"
  val_split: "validation"

model:
  hf_id: null           # 예: "mistralai/Mistral-7B-Instruct-v0.3"
  from_scratch: false

training:
  epochs: 1
  batch_size: 4
  grad_accum_steps: 8
  lr: 1.0e-3
  weight_decay: 0.0
  warmup_ratio: 0.03
  mixed_precision: "fp16"   # no | fp16 | bf16
  max_seq_len: 1024

logging:
  wandb_project: "hacknation-2026"
  mlflow_experiment: "default"
  log_every_n_steps: 10

hardware:
  # .env 로 오버라이드 권장
  device: "cuda"
  num_workers: 2
